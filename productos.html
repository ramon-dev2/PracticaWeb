<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Catalogo y filtros de productos en TechStore Online.">
  <title>TechStore Online | Productos</title>
  <base href="./">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header>
    <h1>Catalogo de Productos</h1>
    <nav aria-label="Navegacion principal">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html" aria-current="page">Productos</a></li>
        <li><a href="producto.html">Detalle</a></li>
        <li><a href="carrito.html">Carrito</a></li>
        <li><a href="contacto.html">Contacto</a></li>
        <li><a href="acerca.html">Acerca de</a></li>
      </ul>
    </nav>
  </header>

  <main class="layout">
    <aside>
      <h2>Filtros</h2>
      <form action="productos.html" method="get" aria-label="Filtros de productos" data-filter-form>
        <fieldset>
          <legend>Busqueda</legend>
          <label for="catalogo-busqueda">Producto o descripcion</label>
          <input id="catalogo-busqueda" name="q" type="search" placeholder="Buscar productos...">
        </fieldset>

        <fieldset>
          <legend>Rango de Precio</legend>
          <label for="precio-min">Precio minimo</label>
          <input id="precio-min" name="precio_min" type="number" min="0" max="2000000" step="10000" placeholder="Desde 0">

          <label for="precio-max">Precio maximo</label>
          <input id="precio-max" name="precio_max" type="number" min="0" max="2000000" step="10000" placeholder="Hasta 2000000">
        </fieldset>

        <fieldset>
          <legend>Marca</legend>
          <label for="marca">Marca (con datalist)</label>
          <input id="marca" name="marca" list="lista-marcas" placeholder="Escribe una marca">
          <datalist id="lista-marcas">
            <option value="Apex"></option>
            <option value="NovaTech"></option>
            <option value="Pixelon"></option>
            <option value="GameForge"></option>
          </datalist>
        </fieldset>

        <fieldset>
          <legend>Categoria</legend>
          <label for="categoria">Selecciona categoria</label>
          <select id="categoria" name="categoria">
            <option value="">Todas las categorias</option>
            <optgroup label="Computo">
              <option value="laptops">Laptops</option>
              <option value="accesorios">Accesorios</option>
            </optgroup>
            <optgroup label="Movil y entretenimiento">
              <option value="smartphones">Smartphones</option>
              <option value="gaming">Gaming</option>
              <option value="hogar">Hogar inteligente</option>
            </optgroup>
          </select>
        </fieldset>

        <fieldset>
          <legend>Color</legend>
          <label for="color">Selecciona color base</label>
          <input id="color" name="color" type="color" value="#222222">
        </fieldset>

        <button type="submit">Aplicar filtros</button>
      </form>
    </aside>

    <section>
      <h2>Resultados</h2>
      <p class="result-count" data-result-count></p>
      <div class="grid-products catalog-grid" data-product-catalog></div>
    </section>
  </main>

  <footer>
    <address>TechStore Online - Centro de atencion: +00 555 123 456</address>
    <small>Practica academica HTML5 - Pagina de productos</small>
  </footer>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
